<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Moblin Remote Control</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico" />
    <link rel="stylesheet" href="css/app.css" />
  </head>

  <body class="bg-zinc-950 text-zinc-100 font-sans p-4">
    <div class="max-w-3xl mx-auto space-y-4">
      <h1 class="text-2xl font-bold text-center">Moblin Remote Control</h1>

      <div class="pb-1 text-center space-x-4">
        <a href="./remote.html" class="text-indigo-400 hover:text-indigo-300 text-sm"
          >Scoreboard Control</a
        >
        <a href="./scoreboard.html" class="text-indigo-400 hover:text-indigo-300 text-sm"
          >Scoreboard Display</a
        >
        <a href="./recordings.html" class="text-indigo-400 hover:text-indigo-300 text-sm"
          >Recordings</a
        >
        <a
          href="https://github.com/eerimoq/moblin"
          target="_blank"
          class="text-indigo-400 hover:text-indigo-300 text-sm"
        >
          Github
        </a>
      </div>

      <div class="pb-1 text-center">
        <span id="status" class="text-sm"></span>
      </div>

      <div class="bg-zinc-900 border border-zinc-700 rounded-lg p-4">
        <h2 class="text-xl font-semibold mb-3">Status</h2>
        <h3 class="text-base font-medium text-zinc-300 mb-1">General</h3>
        <div class="overflow-x-auto">
          <table id="statusGeneral" class="w-full text-sm text-left text-zinc-300 table-auto">
            <tbody></tbody>
          </table>
        </div>
        <h3 class="text-base font-medium text-zinc-300 mt-3 mb-1">Top left</h3>
        <div class="overflow-x-auto">
          <table id="statusTopLeft" class="w-full text-sm text-left text-zinc-300 table-auto">
            <tbody></tbody>
          </table>
        </div>
        <h3 class="text-base font-medium text-zinc-300 mt-3 mb-1">Top right</h3>
        <div class="overflow-x-auto">
          <table id="statusTopRight" class="w-full text-sm text-left text-zinc-300 table-auto">
            <tbody></tbody>
          </table>
        </div>
      </div>

      <div class="bg-zinc-900 border border-zinc-700 rounded-lg p-4">
        <h2 class="text-xl font-semibold mb-3">Control</h2>
        <div id="controlLoading" class="text-center text-zinc-400 text-sm py-4">
          Loading settings...
        </div>
        <div id="controlSection" class="space-y-3 hidden">
          <label class="flex items-center cursor-pointer">
            <div class="relative flex items-center">
              <input
                id="controlLive"
                type="checkbox"
                class="peer appearance-none w-11 h-5 bg-slate-400 rounded-full checked:bg-indigo-800 cursor-pointer transition-colors duration-300"
                checked=""
                role="switch"
              />
              <label
                for="controlLive"
                class="absolute top-0 left-0 w-5 h-5 bg-white rounded-full border border-indigo-300 shadow-sm transition-transform duration-300 peer-checked:translate-x-6 peer-checked:border-slate-800 cursor-pointer"
              >
              </label>
              <span class="ml-3 text-sm text-zinc-200">Live</span>
            </div>
          </label>
          <label class="flex items-center cursor-pointer">
            <div class="relative flex items-center">
              <input
                id="controlRecording"
                type="checkbox"
                class="peer appearance-none w-11 h-5 bg-slate-400 rounded-full checked:bg-indigo-800 cursor-pointer transition-colors duration-300"
                checked=""
                role="switch"
              />
              <label
                for="controlRecording"
                class="absolute top-0 left-0 w-5 h-5 bg-white rounded-full border border-indigo-300 shadow-sm transition-transform duration-300 peer-checked:translate-x-6 peer-checked:border-slate-800 cursor-pointer"
              >
              </label>
              <span class="ml-3 text-sm text-zinc-200">Recording</span>
            </div>
          </label>
          <label class="flex items-center cursor-pointer">
            <div class="relative flex items-center">
              <input
                id="controlMuted"
                type="checkbox"
                class="peer appearance-none w-11 h-5 bg-slate-400 rounded-full checked:bg-indigo-800 cursor-pointer transition-colors duration-300"
                checked=""
                role="switch"
              />
              <label
                for="controlMuted"
                class="absolute top-0 left-0 w-5 h-5 bg-white rounded-full border border-indigo-300 shadow-sm transition-transform duration-300 peer-checked:translate-x-6 peer-checked:border-slate-800 cursor-pointer"
              >
              </label>
              <span class="ml-3 text-sm text-zinc-200">Muted</span>
            </div>
          </label>

          <div class="flex items-center space-x-4">
            <label for="controlZoom" class="text-sm text-zinc-200 w-24 shrink-0">Zoom</label>
            <input
              id="controlZoom"
              type="text"
              class="bg-zinc-800 border border-zinc-600 rounded px-2 py-1 text-sm text-zinc-200 w-20"
              placeholder="1.0"
            />
          </div>
          <div id="zoomPresetsContainer" class="hidden">
            <div id="zoomPresets" class="flex flex-wrap gap-2"></div>
          </div>

          <div class="flex items-center space-x-4">
            <label for="controlScene" class="text-sm text-zinc-200 w-24 shrink-0">Scene</label>
            <select
              id="controlScene"
              class="bg-zinc-800 border border-zinc-600 rounded px-2 py-1 text-sm text-zinc-200 flex-1"
            ></select>
          </div>

          <div class="flex items-center space-x-4">
            <label for="controlAutoSceneSwitcher" class="text-sm text-zinc-200 w-24 shrink-0"
              >Auto scene</label
            >
            <select
              id="controlAutoSceneSwitcher"
              class="bg-zinc-800 border border-zinc-600 rounded px-2 py-1 text-sm text-zinc-200 flex-1"
            ></select>
          </div>

          <div class="flex items-center space-x-4">
            <label for="controlMic" class="text-sm text-zinc-200 w-24 shrink-0">Mic</label>
            <select
              id="controlMic"
              class="bg-zinc-800 border border-zinc-600 rounded px-2 py-1 text-sm text-zinc-200 flex-1"
            ></select>
          </div>

          <div class="flex items-center space-x-4">
            <label for="controlBitrate" class="text-sm text-zinc-200 w-24 shrink-0">Bitrate</label>
            <select
              id="controlBitrate"
              class="bg-zinc-800 border border-zinc-600 rounded px-2 py-1 text-sm text-zinc-200 flex-1"
            ></select>
          </div>

          <label class="flex items-center cursor-pointer">
            <div class="relative flex items-center">
              <input
                id="controlDebugLogging"
                type="checkbox"
                class="peer appearance-none w-11 h-5 bg-slate-400 rounded-full checked:bg-indigo-800 cursor-pointer transition-colors duration-300"
                checked=""
                role="switch"
              />
              <label
                for="controlDebugLogging"
                class="absolute top-0 left-0 w-5 h-5 bg-white rounded-full border border-indigo-300 shadow-sm transition-transform duration-300 peer-checked:translate-x-6 peer-checked:border-slate-800 cursor-pointer"
              >
              </label>
              <span class="ml-3 text-sm text-zinc-200">Debug logging</span>
            </div>
          </label>
        </div>
      </div>

      <div id="srtSection" class="bg-zinc-900 border border-zinc-700 rounded-lg p-4 hidden">
        <h2 class="text-xl font-semibold mb-3">SRT Connection Priorities</h2>
        <label class="flex items-center cursor-pointer mb-3">
          <div class="relative flex items-center">
            <input
              id="controlSrtEnabled"
              type="checkbox"
              class="peer appearance-none w-11 h-5 bg-slate-400 rounded-full checked:bg-indigo-800 cursor-pointer transition-colors duration-300"
              role="switch"
            />
            <label
              for="controlSrtEnabled"
              class="absolute top-0 left-0 w-5 h-5 bg-white rounded-full border border-indigo-300 shadow-sm transition-transform duration-300 peer-checked:translate-x-6 peer-checked:border-slate-800 cursor-pointer"
            >
            </label>
            <span class="ml-3 text-sm text-zinc-200">Enabled</span>
          </div>
        </label>
        <div id="srtPriorities" class="space-y-2"></div>
      </div>

      <div id="gimbalSection" class="bg-zinc-900 border border-zinc-700 rounded-lg p-4 hidden">
        <h2 class="text-xl font-semibold mb-3">Gimbal Presets</h2>
        <div id="gimbalPresets" class="flex flex-wrap gap-2"></div>
      </div>

      <div id="filtersSection" class="bg-zinc-900 border border-zinc-700 rounded-lg p-4 hidden">
        <h2 class="text-xl font-semibold mb-3">Filters</h2>
        <div id="filterToggles" class="space-y-3"></div>
      </div>

      <div class="bg-zinc-900 border border-zinc-700 rounded-lg p-4">
        <h2 class="text-xl font-semibold mb-3">Actions</h2>
        <div class="flex flex-wrap gap-2">
          <button
            id="reloadBrowserWidgets"
            class="bg-zinc-700 hover:bg-zinc-600 text-zinc-200 text-sm px-4 py-2 rounded transition-colors"
          >
            Reload browser widgets
          </button>
        </div>
      </div>

      <div class="bg-zinc-900 border border-zinc-700 rounded-lg p-4">
        <h2 class="text-xl font-semibold mb-3">Log</h2>
        <div id="log" class="overflow-y-auto h-96 text-sm text-zinc-300"></div>
      </div>
    </div>

    <script src="js/index.mjs" type="module"></script>
  </body>
</html>
